name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (patch/minor/major) or specific version'
        required: false
        default: 'patch'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # OIDC for npm trusted publishing (no token needed)
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '24'  # bundles npm 11.x (trusted publishing needs >=11.5.1)
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Bump version (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ "$VERSION" == "patch" || "$VERSION" == "minor" || "$VERSION" == "major" ]]; then
            npm version "$VERSION" --no-git-tag-version
          else
            npm version "$VERSION" --no-git-tag-version
          fi

      # Trusted publishing via OIDC — no NPM_TOKEN secret. npm auto-detects
      # the GitHub Actions OIDC environment and exchanges a short-lived token.
      # Requires the trusted publisher to be linked on npmjs.com package settings.
      - name: Publish
        run: npm publish --access public

      - name: Push version bump (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Bump version to $(node -p "require('./package.json').version")"
          git push